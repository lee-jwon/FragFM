# debug
debug: no # deprecated
use_wandb: no
seed: 123

# save
tag: moses

# data
data_dirn: data/processed/moses_brics_all.lmdb

# model embedders and linears
latent_z_dim: 32
decoder_drop_node: 0.0
embd_method: nn
embd_h_dim: 256
embd_e_dim: 128
hid_dim: 256
fc_dropout: 0.0
fc_layer_norm: no
fc_activation: silu
fc_init_method: xavier

# model backbone
backbone_n_encoder_layer: 4
backbone_n_decoder_layer: 4
backbone_dropout: 0.1
backbone_layer_norm: yes
backbone_activation: silu
backbone_init_method: xavier

# loss multiplier
reg_loss: 1.0e-4

# optimizer
lr_warmup: yes
lr_warmup_iter: 2000
optimizer_type: adamw
optimizer_betas: [0.9, 0.999]
lr: 1.0e-4
weight_decay: 1.0e-12

# training params
log_every_n_iter: 1000
eval_every_n_log: 10
bs: 256
grad_clip: 8.0

# system
n_worker: 8
