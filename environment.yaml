name: fragfm
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - scipy=1.14.1
  - numpy=1.26.4
  - pandas=2.2.3
  - scikit-learn=1.5.2
  - pip
  - pip:
    - --index-url https://download.pytorch.org/whl/cu118
    - torch==2.1.0+cu118
    - --extra-index-url https://pypi.org/simple
    - torch-geometric
    - rdkit==2023.9.2
    - git+https://github.com/bp-kelley/descriptastorus.git
    - wandb==0.18.6
    - lmdb==1.5.1
    - pyyaml==6.0.1
    - easydict==1.13
    - parmap==1.7.0
    - matplotlib==3.8.1
    - seaborn==0.13.0
    - -e .
