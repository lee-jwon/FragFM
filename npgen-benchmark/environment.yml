name: npgenbenchmark
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  - numpy=1.21
  - rdkit=2020.03.2
  - boost
  - boost-cpp
  - zlib=1.2.13
  - icu=68.2
  - pip
  - pip:
      - pandas
      - huggingface_hub
      - scikit-learn
      - scipy
      - tqdm
      - torch
      - fcd_torch
      - -e .
